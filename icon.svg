<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2230"/>
      <stop offset="100%" stop-color="#0f1115"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb23f"/>
      <stop offset="100%" stop-color="#ff6b1a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- court lines -->
  <g stroke="#323849" stroke-width="4" fill="none" opacity="0.7">
    <rect x="72" y="112" width="368" height="288" rx="6"/>
    <line x1="256" y1="112" x2="256" y2="400"/>
    <circle cx="256" cy="256" r="44"/>
  </g>
  <!-- Big "8" -->
  <text x="256" y="334"
        font-family="Archivo, Arial Black, sans-serif"
        font-weight="900"
        font-size="280"
        text-anchor="middle"
        fill="url(#accent)"
        letter-spacing="-8">8</text>
</svg>
